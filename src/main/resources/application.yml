spring:
  application:
    name: spring-ai-enterprise
  # AGGIUNGI QUESTE DUE RIGHE:
  config:
    import: optional:file:./secrets.properties
  profiles:
    active: gemini
  main:
    allow-bean-definition-overriding: true

  # ----------------------------------------------------------------------------
  # IL BAZOOKA (Sottile): Solo ciò che blocca l'avvio fisico
  # ----------------------------------------------------------------------------
  autoconfigure:
    exclude:
      - org.springframework.ai.model.azure.openai.autoconfigure.AzureOpenAiChatAutoConfiguration
      - org.springframework.ai.model.azure.openai.autoconfigure.AzureOpenAiEmbeddingAutoConfiguration
      - org.springframework.ai.model.zhipuai.autoconfigure.ZhiPuAiChatAutoConfiguration
      - org.springframework.ai.model.zhipuai.autoconfigure.ZhiPuAiImageAutoConfiguration

  # ----------------------------------------------------------------------------
  # DISATTIVAZIONE CHIRURGICA: Spegniamo i motori tramite proprietà
  # ----------------------------------------------------------------------------
  ai:
    moonshot:
      chat:
        enabled: false
    ollama:
      chat:
        enabled: false
    openai:
      chat:
        enabled: false
    google:
      genai:
        chat:
          enabled: false
    anthropic:
      chat:
        enabled: false
    azure:
      openai:
        chat:
          enabled: false
        endpoint: "https://dummy.openai.azure.com"
        api-key: "dummy"

# ==============================================================================
# IL CRUSCOTTO DELLE FEATURE (Fondamentale per la tua classe Java)
# ==============================================================================
app:
  ai:
    system-message: "Sei un assistente enterprise esperto. Rispondi in modo professionale e tecnico."
    features:
      memory-enabled: true
      memory-max-messages: 10
      tools-enabled: true
      logging-enabled: true
      structured-output: true
      output-format: JSON

# 📊 CONFIGURAZIONE ACTUATOR E METRICHE
management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus # Abilitiamo Prometheus
  metrics:
    tags:
      application: ${spring.application.name} # Taggiamo i dati col nome dell'app
  endpoint:
    health:
      show-details: always

# ==============================================================================
# DEFINIZIONE PROFILI (Interruttori Specifici)
# ==============================================================================

---
# ♊ PROFILO: GEMINI
spring:
  config:
    activate:
      on-profile: gemini
  ai:
    google:
      genai:
        enabled: true
        api-key: ${GEMINI_API_KEY}
        project-id: "dummy-project-id" # <--- Aggiungi questo
        chat:
          options:
            model: gemini-2.5-flash
            temperature: 0.0
            google-search-retrieval: false
        embedding:
          enabled: false

---
# 🧠 PROFILO: CLAUDE
spring:
  config:
    activate:
      on-profile: claude
  ai:
    anthropic:
      enabled: true
      api-key: ${ANTHROPIC_API_KEY}
      chat:
        options:
          model: claude-haiku-4-5-20251001
          temperature: 0.0 # Il thinking funziona meglio con temperature alte
#          max-tokens: 4096
#          thinking: # <--- SUPERPOTERE CLAUDE AGGIUNTO QUI
#            type: false
#            budget-tokens: 2048

---
# 🦙 PROFILO: OLLAMA
spring:
  config:
    activate:
      on-profile: ollama
  ai:
    ollama:
      chat:
        enabled: true
        options:
          model: llama3.1

---
# 🤖 PROFILO: OPENAI
spring:
  config:
    activate:
      on-profile: openai
  ai:
    openai:
      enabled: true
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4o

---
# ☁️ PROFILO: AZURE
spring:
  config:
    activate:
      on-profile: azure
  ai:
    azure:
      openai:
        enabled: true
        api-key: ${AZURE_API_KEY}
        endpoint: ${AZURE_ENDPOINT}
        chat:
          options:
            deployment-name: gpt-4o

---
# 🏔️ PROFILO: BEDROCK
spring:
  config:
    activate:
      on-profile: bedrock
  ai:
    bedrock:
      aws:
        region: us-east-1
      converse:
        chat:
          options:
            model: anthropic.claude-3-sonnet-20240229-v1:0

---
# 🎨 PROFILO: MULTIMEDIA (Stability AI / ElevenLabs)
spring:
  config:
    activate:
      on-profile: multimedia
  ai:
    stabilityai:
      api-key: ${STABILITY_API_KEY}
    elevenlabs:
      api-key: ${ELEVENLABS_API_KEY}

---
# 🌪️ PROFILO: OTHERS (Mistral, DeepSeek, HF)
spring:
  config:
    activate:
      on-profile: others
  ai:
    mistralai:
      api-key: ${MISTRAL_API_KEY}
    deepseek:
      api-key: ${DEEPSEEK_API_KEY}
    huggingface:
      chat:
        api-key: ${HF_API_KEY}

---
# 🌙 PROFILO: MOONSHOT
spring:
  config:
    activate:
      on-profile: moonshot
  ai:
    moonshot:
      api-key: ${MOONSHOT_API_KEY}