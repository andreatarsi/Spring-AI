# ==========================================
# ? IL MODELLO DI BUSINESS B2B: MODELLI PRIVATI (FINE-TUNED)
# ==========================================
# PROMEMORIA COMMERCIALE:
# Come offrire un'IA personalizzata a diverse aziende (es. Banca, Ospedale)
# senza cambiare una singola riga di codice Java nel nostro ChatClient.
#
# Strategia: Prendi un modello base (Llama 3, Mistral, Gemini), lo addestri
# (Fine-Tuning) con i documenti segreti dell'azienda cliente e lo ospiti
# in un ambiente cloud isolato e privato.

# ----------------------------------------------------------------------
# OPZIONE 1: VERTEX AI MODEL GARDEN (Per Clienti Enterprise / Banche)
# ----------------------------------------------------------------------
# L'infrastruttura gira sui server sicuri di Google Cloud (VPC privata).
# Invece di usare il nome standard "gemini-2.0-flash", usiamo l'ID univoco
# dell'Endpoint Privato che Google ha generato dopo l'addestramento.
#
# spring.ai.model.chat=vertexai
# spring.ai.vertex.ai.gemini.project-id=progetto-cloud-cliente
# spring.ai.vertex.ai.gemini.chat.options.model=projects/progetto-cloud-cliente/locations/us-central1/endpoints/123456789_ID_SEGRETO


# ----------------------------------------------------------------------
# OPZIONE 2: HUGGING FACE INFERENCE ENDPOINTS (Open Source Flessibile)
# ----------------------------------------------------------------------
# Noleggi un server dedicato su Hugging Face, ci carichi un modello
# open-source personalizzato e ottieni un URL che conosci solo tu.
#
# spring.ai.model.chat=huggingface
# spring.ai.huggingface.chat.api-key=CHIAVE_ACCESSO_CLIENTE_A
# spring.ai.huggingface.chat.url=https://modello-legale-cliente-a.endpoints.huggingface.cloud

# ==========================================
# CONFIGURAZIONE MISTRAL AI (IL GIGANTE EUROPEO)
# ==========================================

# 1. Per attivarlo, cambia 'none' in 'mistral'
# spring.ai.model.chat=mistral

# 2. API Key da console.mistral.ai
spring.ai.mistralai.api-key=LA_TUA_CHIAVE_MISTRAL

# 3. Modello di default e sicurezza
spring.ai.mistralai.chat.options.model=mistral-large-latest
spring.ai.mistralai.chat.options.temperature=0.7
# Attiviamo il guardrail di sicurezza nativo di Mistral!
spring.ai.mistralai.chat.options.safePrompt=true

# ==========================================
# CONFIGURAZIONE MINIMAX (IL GIGANTE ASIATICO)
# ==========================================

# 1. Per attivarlo, cambia 'none' in 'minimax'
# spring.ai.model.chat=minimax

# 2. API Key dal portale MiniMax
spring.ai.minimax.api-key=LA_TUA_CHIAVE_MINIMAX

# 3. Modello di default (usiamo la versione "g" che č ottima)
spring.ai.minimax.chat.options.model=abab6.5g-chat
spring.ai.minimax.chat.options.temperature=0.7

# ==========================================
# CONFIGURAZIONE NVIDIA (IL RE DELL'HARDWARE)
# ==========================================

# 1. Usiamo il motore OpenAI
# spring.ai.model.chat=openai

# 2. API Key da integrate.api.nvidia.com e l'URL camuffato da OpenAI
#spring.ai.openai.api-key=LA_TUA_CHIAVE_NVIDIA
spring.ai.openai.base-url=https://integrate.api.nvidia.com

# 3. Scegliamo un modello ospitato da NVIDIA (es. il potentissimo Llama 3.1 70B di Meta)
spring.ai.openai.chat.options.model=meta/llama-3.1-70b-instruct

# 4. LA TRAPPOLA DI NVIDIA: Devi impostare i max-tokens altrimenti va in errore!
spring.ai.openai.chat.options.max-tokens=2048

# 5. Spegniamo gli embeddings (non supportati da questo endpoint)
spring.ai.openai.embedding.enabled=false

# ==========================================
# CONFIGURAZIONE OLLAMA (IL RE DEL LOCALE)
# ==========================================
spring.ai.model.chat=ollama
spring.ai.ollama.base-url=http://localhost:11434

# Il modello di default
spring.ai.ollama.chat.options.model=llama3.2
spring.ai.ollama.chat.options.temperature=0.7

# MAGIA DELL'AUTO-PULL ALL'AVVIO
spring.ai.ollama.init.timeout=15m

# SINTASSI CORRETTA: Usiamo la virgola per separare i modelli!
# Diciamo a Spring di tirare giů il Llama 3.2 e anche il GGUF esterno
spring.ai.ollama.init.chat.additional-models=llama3.2, hf.co/bartowski/Llama-3.2-1B-Instruct-GGUF

# ==========================================
# CONFIGURAZIONE PERPLEXITY AI (IL MOTORE DI RICERCA)
# ==========================================

# 1. Usiamo il motore OpenAI
#spring.ai.model.chat=openai

# 2. API Key da perplexity.ai e l'URL camuffato da OpenAI
#spring.ai.openai.api-key=LA_TUA_CHIAVE_PERPLEXITY
#spring.ai.openai.base-url=https://api.perplexity.ai

# 3. TRAPPOLA DI PERPLEXITY: Bisogna togliere il /v1 dal path!
spring.ai.openai.chat.completions-path=/chat/completions

# 4. Scegliamo un modello "Sonar" (sono quelli ottimizzati per la ricerca web)
#spring.ai.openai.chat.options.model=llama-3.1-sonar-small-128k-online
#spring.ai.openai.chat.options.temperature=0.2

# 5. Spegniamo gli embeddings (non supportati)
#spring.ai.openai.embedding.enabled=false

# ==========================================
# CONFIGURAZIONE OCI GENAI (IL FORT KNOX DI ORACLE)
# ==========================================

# 1. Per attivarlo, cambia 'none' in 'oci-genai'
# spring.ai.model.chat=oci-genai

# 2. Metodo di autenticazione di massima sicurezza (tramite file di configurazione OCI)
spring.ai.oci.genai.authenticationType=file
# (C:\Users\tuonome\.oci\config su Windows o ~/.oci/config su Mac/Linux).

# 3. L'OCID (Oracle Cloud Identifier) del tuo "Scompartimento" Cloud aziendale
spring.ai.oci.genai.cohere.chat.options.compartment=ocid1.compartment.oc1..esempio123

# 4. Modello Cohere (famosissimo per l'uso aziendale)
spring.ai.oci.genai.cohere.chat.options.model=cohere.command-r-plus

# 5. Modalitŕ on-demand (oppure 'dedicated' se hai affittato il server intero)
spring.ai.oci.genai.cohere.chat.options.servingMode=on-demand

# ==========================================
# CONFIGURAZIONE OPENAI SDK (UFFICIALE)
# ==========================================
# spring.ai.model.chat=openai-sdk

# Chiave OpenAI standard
spring.ai.openai-sdk.api-key=${OPENAI_API_KEY}
spring.ai.openai-sdk.chat.options.model=gpt-4o-mini

# ==========================================
# CONFIGURAZIONE BAIDU QIANFAN (COMMUNITY)
# ==========================================

# 1. Le due chiavi di sicurezza dal portale Baidu Cloud
#spring.ai.qianfan.api-key=LA_TUA_API_KEY_QIANFAN
#spring.ai.qianfan.secret-key=LA_TUA_SECRET_KEY_QIANFAN

# 2. Configurazione opzionale per i modelli
# spring.ai.qianfan.chat.options.model=ERNIE-Bot-turbo

# ==========================================
# CONFIGURAZIONE ZHIPU AI (IL RIVALE DI OPENAI)
# ==========================================

# 1. Per attivarlo, cambia 'none' in 'zhipuai'
# spring.ai.model.chat=zhipuai

# 2. La tua chiave API
spring.ai.zhipuai.api-key=LA_TUA_CHIAVE_ZHIPU

# 3. Modello di default (GLM-4 Air č velocissimo e bilanciato)
spring.ai.zhipuai.chat.options.model=glm-4-air
spring.ai.zhipuai.chat.options.temperature=0.7
# Abilitiamo la "Chain of Thought" (Thinking Mode) direttamente da properties!
spring.ai.zhipuai.chat.options.thinking.type=enabled
# Attiviamo il modello visivo di ZhiPu AI
spring.ai.zhipuai.image.options.model=cogview-3

# Spring Boot "Zitto e fai vincere l'ultimo arrivato":
spring.main.allow-bean-definition-overriding=true

