# ==========================================
# CONFIGURAZIONE GOOGLE GENAI (GEMINI) (DA ATTIVARE IN FUTURO)
# ==========================================

# 1. Per attivarlo in futuro, cambia 'none' in 'google-genai'
# spring.ai.model.chat=google-genai

# 2. API Key da Google AI Studio (Gratuita per gli sviluppatori!)
