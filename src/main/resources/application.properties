# spring.application.name=spring-ai-demo
# spring.ai.openai.api-key=${OPENAI_API_KEY}


# Disabilita l'autoconfigurazione di OpenAI
spring.autoconfigure.exclude=org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration,org.springframework.ai.model.openai.autoconfigure.OpenAiAutoConfiguration

# spring.ai.chat.client.enabled=false

# Configura Ollama
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.options.model=llama3.2

# Abilita i log di DEBUG per vedere i dettagli dell'Advisor
logging.level.org.springframework.ai.chat.client.advisor=DEBUG

logging.level.org.springframework.ai=DEBUG

# Fix per il bug di Spring Boot 3.4 con i client reattivi
spring.http.client.factory=jdk