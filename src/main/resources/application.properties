# spring.application.name=spring-ai-demo
spring.ai.openai.api-key=${OPENAI_API_KEY}

# Disabilita l'autoconfigurazione di OpenAI per evitare conflitti
spring.autoconfigure.exclude=org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration,\
org.springframework.ai.model.openai.autoconfigure.OpenAiAutoConfiguration,\
org.springframework.ai.model.elevenlabs.autoconfigure.ElevenLabsAutoConfiguration,\
org.springframework.ai.model.stabilityai.autoconfigure.StabilityAiImageAutoConfiguration

# Abilita i log di DEBUG
logging.level.org.springframework.ai.chat.client.advisor=DEBUG
logging.level.org.springframework.ai=DEBUG

# Fix per il client reattivo JDK
spring.http.client.factory=jdk

# ==========================================
# CONFIGURAZIONE AWS BEDROCK
# ==========================================
spring.ai.bedrock.aws.region=us-east-1
spring.ai.bedrock.converse.chat.options.model=anthropic.claude-3-5-sonnet-20240620-v1:0
spring.ai.bedrock.converse.chat.options.temperature=0.6

# ==========================================
# CONFIGURAZIONE ANTHROPIC CLAUDE
# ==========================================
spring.ai.anthropic.api-key={ANTHROPIC_API_KEY}
spring.ai.anthropic.chat.options.model=claude-3-7-sonnet-latest
spring.ai.anthropic.chat.options.temperature=1.0
spring.ai.anthropic.chat.options.max-tokens=8192

# ==========================================
# CONFIGURAZIONE AZURE OPENAI
# ==========================================
spring.ai.azure.openai.api-key=LA_TUA_CHIAVE_AZURE
spring.ai.azure.openai.endpoint=IL_TUO_ENDPOINT_AZURE
spring.ai.azure.openai.chat.options.deployment-name=gpt-4o
spring.ai.azure.openai.chat.options.temperature=0.7

# ==========================================
# CONFIGURAZIONE DEEPSEEK
# ==========================================
spring.ai.deepseek.api-key=LA_TUA_CHIAVE_DEEPSEEK
spring.ai.deepseek.chat.options.model=deepseek-chat
spring.ai.deepseek.chat.options.temperature=0.8

# ==========================================
# CONFIGURAZIONE GOOGLE GENAI (GEMINI)
# ==========================================
spring.ai.google.genai.api-key={GEMINI_API_KEY}
spring.ai.google.genai.chat.options.model=gemini-2.5-pro
spring.ai.google.genai.chat.options.temperature=0.0

# ==========================================
# CONFIGURAZIONE GOOGLE VERTEX AI (ENTERPRISE)
# ==========================================
spring.ai.vertex.ai.gemini.project-id=IL_TUO_PROJECT_ID_GCP
spring.ai.vertex.ai.gemini.location=us-central1
spring.ai.vertex.ai.gemini.chat.options.model=gemini-2.0-flash
spring.ai.vertex.ai.gemini.chat.options.temperature=0.5

# ==========================================
# CONFIGURAZIONE GROQ
# ==========================================
spring.ai.openai.chat.options.temperature=0.7

# ==========================================
# CONFIGURAZIONE HUGGING FACE
# ==========================================
spring.ai.huggingface.chat.api-key=LA_TUA_CHIAVE_HF
spring.ai.huggingface.chat.url=https://iltuo-endpoint-privato.endpoints.huggingface.cloud

# ==========================================
# CONFIGURAZIONE MISTRAL AI
# ==========================================
spring.ai.mistralai.api-key=LA_TUA_CHIAVE_MISTRAL
spring.ai.mistralai.chat.options.model=mistral-large-latest
spring.ai.mistralai.chat.options.temperature=0.7
spring.ai.mistralai.chat.options.safePrompt=true

# ==========================================
# CONFIGURAZIONE MINIMAX
# ==========================================
spring.ai.minimax.api-key=LA_TUA_CHIAVE_MINIMAX
spring.ai.minimax.chat.options.model=abab6.5g-chat
spring.ai.minimax.chat.options.temperature=0.7

# ==========================================
# CONFIGURAZIONE NVIDIA
# ==========================================
spring.ai.openai.base-url=https://integrate.api.nvidia.com
spring.ai.openai.chat.options.model=meta/llama-3.1-70b-instruct
spring.ai.openai.chat.options.max-tokens=2048
spring.ai.openai.embedding.enabled=false

# ==========================================
# CONFIGURAZIONE OLLAMA (LOCALE)
# ==========================================
# Usiamo llama3.1 o llama3.2 che sono ottimi con i Tools
spring.ai.ollama.chat.options.model=llama3.1
spring.ai.model.chat=openai
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.options.temperature=0.0
spring.ai.ollama.init.timeout=15m
spring.ai.ollama.init.chat.additional-models=llama3.1, llama3.2, mistral, hf.co/bartowski/Llama-3.2-1B-Instruct-GGUF
spring.ai.ollama.chat.enabled=false
spring.ai.openai.chat.enabled=false
spring.ai.openai-sdk.chat.enabled=false
spring.ai.google.genai.chat.enabled=false

# Perplexity fix path
spring.ai.openai.chat.completions-path=/chat/completions

# ==========================================
# CONFIGURAZIONE OCI GENAI (ORACLE)
# ==========================================
spring.ai.oci.genai.authenticationType=file
spring.ai.oci.genai.cohere.chat.options.compartment=ocid1.compartment.oc1..esempio123
spring.ai.oci.genai.cohere.chat.options.model=cohere.command-r-plus
spring.ai.oci.genai.cohere.chat.options.servingMode=on-demand

# ==========================================
# CONFIGURAZIONE OPENAI SDK (UFFICIALE)
# ==========================================
spring.ai.openai-sdk.api-key=${OPENAI_API_KEY}
spring.ai.openai-sdk.chat.options.model=gpt-4o-mini

# ==========================================
# CONFIGURAZIONE ZHIPU AI
# ==========================================
spring.ai.zhipuai.api-key=LA_TUA_CHIAVE_ZHIPU
spring.ai.zhipuai.chat.options.model=glm-4-air
spring.ai.zhipuai.chat.options.temperature=0.7
spring.ai.zhipuai.chat.options.thinking.type=enabled
spring.ai.zhipuai.image.options.model=cogview-3

# Permetti override bean
spring.main.allow-bean-definition-overriding=true

# ==========================================
# CONFIGURAZIONE EMBEDDINGS
# ==========================================
spring.ai.model.embedding=ollama
spring.ai.ollama.embedding.model=bge-m3
spring.ai.ollama.init.pull-model-strategy=when_missing
spring.ai.ollama.init.embedding.additional-models=hf.co/mixedbread-ai/mxbai-embed-large-v1



# Assicurati che non ci siano conflitti in fondo al file
# Rimuovi o commenta la riga sotto se presente in altre sezioni:
# spring.ai.ollama.chat.options.model=mistral

# --- DATABASE ---
spring.datasource.url=jdbc:h2:file:./data/chatdb;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- H2 CONSOLE ---
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
# Rende la console accessibile anche se ci sono filtri attivi
spring.h2.console.settings.web-allow-others=true

# --- CHAT MEMORY PERSISTENCE ---
# Come da documentazione: inizializza lo schema JDBC
spring.ai.chat.memory.repository.jdbc.initialize-schema=always