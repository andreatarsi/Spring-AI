# spring.application.name=spring-ai-demo
spring.ai.openai.api-key=${OPENAI_API_KEY}


# Disabilita l'autoconfigurazione di OpenAI
spring.autoconfigure.exclude=org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration,org.springframework.ai.model.openai.autoconfigure.OpenAiAutoConfiguration

# spring.ai.chat.client.enabled=false

# Configura Ollama
#spring.ai.ollama.base-url=http://localhost:11434
#spring.ai.ollama.chat.options.model=llama3.2

# Abilita i log di DEBUG per vedere i dettagli dell'Advisor
logging.level.org.springframework.ai.chat.client.advisor=DEBUG

logging.level.org.springframework.ai=DEBUG

# Fix per il bug di Spring Boot 3.4 con i client reattivi
spring.http.client.factory=jdk

# ==========================================
# CONFIGURAZIONE AWS BEDROCK (DA ATTIVARE IN FUTURO)
# ==========================================

# 1. Spegniamo Bedrock di default per non farlo scontrare con Ollama adesso.
# Quando avrai l'account, cambia 'none' in 'bedrock-converse'
#spring.ai.model.chat=none

# 2. Le Credenziali AWS (Lasciale vuote o usa variabili d'ambiente)
spring.ai.bedrock.aws.region=us-east-1
#spring.ai.bedrock.aws.access-key=${AWS_ACCESS_KEY_ID}
#spring.ai.bedrock.aws.secret-key=${AWS_SECRET_ACCESS_KEY}

# 3. Il Modello da usare. Amazon Bedrock fa da "hub" per tanti modelli.
# Claude 3.5 Sonnet č attualmente uno dei migliori al mondo per codice e logica.
spring.ai.bedrock.converse.chat.options.model=anthropic.claude-3-5-sonnet-20240620-v1:0
spring.ai.bedrock.converse.chat.options.temperature=0.6

# ==========================================
# CONFIGURAZIONE ANTHROPIC CLAUDE (DA ATTIVARE IN FUTURO)
# ==========================================

# 1. Per attivarlo in futuro, cambia 'none' in 'anthropic'
# spring.ai.model.chat=anthropic

# 2. La tua API Key (mettila qui quando l'avrai creata sulla dashboard di Anthropic)
spring.ai.anthropic.api-key=INSERISCI_QUI_LA_TUA_CHIAVE

# 3. Usiamo Claude 3.7 Sonnet: il re indiscusso per il "Thinking" e la programmazione
spring.ai.anthropic.chat.options.model=claude-3-7-sonnet-latest
# Per la modalitŕ "Thinking", Anthropic obbliga a usare la temperatura al massimo (1.0)
spring.ai.anthropic.chat.options.temperature=1.0
spring.ai.anthropic.chat.options.max-tokens=8192

# ==========================================
# CONFIGURAZIONE AZURE OPENAI (DA ATTIVARE IN FUTURO)
# ==========================================

# 1. Per attivarlo in futuro, cambia 'none' in 'azure-openai'
# spring.ai.model.chat=azure-openai

# 2. Le tue credenziali dal portale Azure
spring.ai.azure.openai.api-key=LA_TUA_CHIAVE_AZURE
spring.ai.azure.openai.endpoint=IL_TUO_ENDPOINT_AZURE

# 3. NOTA BENE: In Azure si usa il "Deployment Name", non il nome del modello!
# Assumiamo di aver creato un deployment chiamato "gpt-4o" sul portale.
spring.ai.azure.openai.chat.options.deployment-name=gpt-4o
spring.ai.azure.openai.chat.options.temperature=0.7

# ==========================================
# CONFIGURAZIONE DEEPSEEK (DA ATTIVARE IN FUTURO)
# ==========================================

# 1. Per attivarlo in futuro, cambia 'none' in 'deepseek'
# spring.ai.model.chat=deepseek

# 2. Le tue credenziali dal portale DeepSeek
spring.ai.deepseek.api-key=LA_TUA_CHIAVE_DEEPSEEK

# 3. Impostiamo il modello base di default
spring.ai.deepseek.chat.options.model=deepseek-chat
spring.ai.deepseek.chat.options.temperature=0.8

